name: Release

on:
  push:
    branches: ['**']

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build library and embed
        run: npm run build && npm run build:embed

      # No NPM_TOKEN: publishing authenticates via OIDC Trusted Publishing.
      # Requires a trusted publisher for @bitsnbobs/starch configured on npmjs.org
      # pointing at this repo and the Release workflow.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
